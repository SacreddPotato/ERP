name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, sqlite3, pdo_sqlite, zip, sodium, fileinfo, grpc
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Setup environment
        run: |
          copy .env.example .env
          php artisan key:generate
        shell: cmd

      - name: Configure NativePHP updater
        run: |
          # Remove existing entries to avoid dotenv immutable first-value-wins conflict
          sed -i '/^NATIVEPHP_APP_VERSION=/d' .env
          sed -i '/^NATIVEPHP_UPDATER_ENABLED=/d' .env
          sed -i '/^NATIVEPHP_UPDATER_PROVIDER=/d' .env
          sed -i '/^GITHUB_REPO=/d' .env
          sed -i '/^GITHUB_OWNER=/d' .env
          sed -i '/^GITHUB_TOKEN=/d' .env
          sed -i '/^GITHUB_RELEASE_TYPE=/d' .env
          # Now append the correct values
          VERSION=${GITHUB_REF_NAME#v}
          echo NATIVEPHP_APP_VERSION=$VERSION >> .env
          echo NATIVEPHP_UPDATER_ENABLED=true >> .env
          echo NATIVEPHP_UPDATER_PROVIDER=github >> .env
          echo GITHUB_REPO=ERP >> .env
          echo GITHUB_OWNER=SacreddPotato >> .env
          echo GITHUB_RELEASE_TYPE=release >> .env
          echo GITHUB_TOKEN=${{ github.token }} >> .env
        shell: bash

      - name: Write Firebase credentials
        env:
          FIREBASE_CREDS_JSON: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: printenv FIREBASE_CREDS_JSON > firebase-service-account.json
        shell: bash

      - name: Validate Firebase credentials
        run: php .github/validate-firebase.php

      - name: Build NativePHP Electron app
        run: php artisan native:build win --publish

      - name: Package build output
        run: |
          if (Test-Path "dist\win-x64-unpacked") {
            Compress-Archive -Path dist\win-x64-unpacked\* -DestinationPath dist\EnterprisFlow-${{ github.ref_name }}-win-x64.zip
          } elseif (Test-Path "dist\win-unpacked") {
            Compress-Archive -Path dist\win-unpacked\* -DestinationPath dist\EnterprisFlow-${{ github.ref_name }}-win-x64.zip
          }
        shell: pwsh

      - name: List dist output for debugging
        run: Get-ChildItem -Path dist -Recurse -File | Select-Object FullName, Length
        shell: pwsh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: enterprisflow-windows
          path: |
            dist/EnterprisFlow-*-setup.exe
            dist/EnterprisFlow-*-setup.exe.blockmap
            dist/latest.yml
            dist/EnterprisFlow-*-win-x64.zip

      - name: Update GitHub Release with zip
        uses: softprops/action-gh-release@v2
        with:
          files: dist/EnterprisFlow-*-win-x64.zip
          generate_release_notes: true
